<!DOCTYPE html>
<html lang="en">
<head>
    {% block head %}
    <meta charset="UTF-8">
    <title>The Wandering God - {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/layout.css') }}">
    <link rel="script" href="{{ url_for('static', filename='js/layout.js') }}">
    <link rel="shortcut icon" href="/favicon.ico">
    <script type="text/javascript" src="{{ url_for('static', filename='js/layout.js') }}"></script>

    {% endblock %}
</head>
<body>
<div id="header">
    {% block header %}{% endblock %}
</div>
<div id="menu">
    {% block menu %}{% endblock %}
</div>
<div id="content">
    {% block content %}{% endblock %}
</div>
<div id="footer">
    {% block footer %}
    <p align="center">&copy; Copyright 1997-2019 <a href="mailto:rendier@thewanderinggod.com">rendier@thewanderinggod.com</a>
    </p>
    {% endblock %}
</div>
</body>
</html>
