{% extends "layout.html" %}

{% block content %}
<div id="box">
    <h2 align="center" style="text-decoration: underline">Login to The Wandering God</h2>
    <form method="POST">
        <p align="center">Username <input type="text" name="username"></p>
        <p align="center">Password <input type="password" name="password"></p>
        <p align="center"><input type="submit" value="Login"></p>
    </form>
    {% if errorMsg %}
    <p>{{ errorMsg }}</p>
    {% endif %}
</div>
{% endblock %}
